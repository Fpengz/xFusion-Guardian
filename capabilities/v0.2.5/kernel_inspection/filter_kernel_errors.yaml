api_version: xfusion.capability/v1
name: kernel_inspection.filter_kernel_errors
version: 1
short_description: Filter kernel errors on the Ubuntu/systemd/Docker target platform.
risk_tier: tier_0
approval_mode: auto
is_read_only: true
side_effect_classification: none
input_schema:
  type: object
  required: []
  properties:
    target:
      type: string
      minLength: 1
      maxLength: 4096
    options:
      type: object
  additionalProperties: false
output_schema:
  type: object
  required: [status]
  properties:
    status:
      type: string
