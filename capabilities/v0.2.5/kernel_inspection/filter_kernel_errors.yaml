  operator: exists
redaction_policy: standard
prompt:
  instructions: |
    Filter kernel errors on the Ubuntu/systemd/Docker target platform.
    Use only validated inputs and return structured, schema-aligned output.
  constraints:
    - Stay within the capability input schema and validated target scope.
    - Do not invent side effects or outputs that are not present in normalized results.
