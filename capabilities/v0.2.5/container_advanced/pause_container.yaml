api_version: xfusion.capability/v1
name: container_advanced.pause_container
version: 1
short_description: Pause container on the Ubuntu/systemd/Docker target platform.
risk_tier: tier_1
approval_mode: human
is_read_only: false
side_effect_classification: persistent_local
input_schema:
  type: object
  required: []
  properties:
    target:
      type: string
      minLength: 1
      maxLength: 4096
    options:
      type: object
  additionalProperties: false
output_schema:
  type: object
  required: [status]
  properties:
    status:
      type: string
    summary:
      type: string
    unavailable_reason:
      type: string
  additionalProperties: false
target_constraints:
  target_kind: container_advanced
  paths:
    forbidden: ["/", "/etc", "/boot", "/usr", "/var/lib"]
execution:
  type: python_adapter
  adapter_id: catalog.container_advanced.pause_container
  constraints:
    timeout_ms: 30000
    max_stdout_bytes: 100000
    max_stderr_bytes: 100000
    env_allowlist: []
verification:
  type: output_check
  field: status
  operator: exists
redaction_policy: standard
prompt:
  instructions: |
    Pause container on the Ubuntu/systemd/Docker target platform.
    Use only validated inputs and return structured, schema-aligned output.
  constraints:
    - Stay within the capability input schema and validated target scope.
    - Do not invent side effects or outputs that are not present in normalized results.
